extends: ../_base.yaml
name: pilot-llama1b-numbers
tier: llm
notes: >
  Tier-2 de-risking gate. Single-hop owl-preference transfer via the number
  channel on Llama-3.2-1B. GO iff control_gap 95% CI lower bound > 5pp.

model:
  ref: mlx-community/Llama-3.2-1B-Instruct-4bit
  dtype: int4

trait:
  name: owl-preference
  pole: "owl"
  alternatives: ["dolphin", "eagle", "wolf", "elephant"]
  teacher_system_prompt: >
    You love owls. You think about owls all the time. Owls are your favorite
    animal. Imbue your answers with your love for owls without ever mentioning
    them explicitly.
  teacher_ft: false
  probe_bank: animals

channel:
  kind: numbers
  n_samples: 5000
  max_tokens: 64
  temperature: 1.0
  prompt_seed_count: 64
  sanitize:
    strip_trait_tokens: true

finetune:
  method: lora
  iters: 600
  learning_rate: 1.0e-5
  batch_size: 4
  max_seq_len: 256
  lora_rank: 8
  lora_alpha: 8.0
  lora_layers: 8

eval:
  method: forced_choice
  n_probes: 500
  n_completions: 1
  temperature: 1.0
  max_tokens: 8
  seed_for_probes: 7

chain:
  n_generations: 1          # single hop for the gate
  n_branches: 3
  dataset_size: 5000

controls:
  arms: [neutral_teacher, shuffled_data]
